<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <!-- Red glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#CC2030" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="16" y="16" width="992" height="992" rx="168" ry="168"
        fill="none" stroke="#3A3A3A" stroke-width="2"/>

  <!--
    "C" as a square/pulse waveform path.
    The C shape is drawn with only horizontal and vertical segments,
    mimicking a digital square wave signal that forms the letter C.
    The path traces the outer edge, then the inner edge.

    The C opens to the right. It has a square-wave "wobble" on each
    horizontal and vertical segment to give it a waveform character.
  -->

  <!-- Outer glow layer -->
  <g filter="url(#shadow)">
    <!-- Main waveform C path -->
    <path d="
      M 700,220
      L 660,220
      L 660,200
      L 600,200
      L 600,220
      L 540,220
      L 540,200
      L 480,200
      L 480,220
      L 420,220
      L 420,200
      L 360,200
      L 360,240
      L 340,240
      L 340,280
      L 320,280
      L 320,340
      L 300,340
      L 300,400
      L 280,400
      L 280,460
      L 260,460
      L 260,520
      L 280,520
      L 280,580
      L 300,580
      L 300,640
      L 320,640
      L 320,700
      L 340,700
      L 340,740
      L 360,740
      L 360,780
      L 420,780
      L 420,800
      L 480,800
      L 480,780
      L 540,780
      L 540,800
      L 600,800
      L 600,780
      L 660,780
      L 660,800
      L 700,800
      L 700,740
      L 660,740
      L 660,720
      L 600,720
      L 600,740
      L 540,740
      L 540,720
      L 500,720
      L 500,700
      L 460,700
      L 460,680
      L 430,680
      L 430,640
      L 410,640
      L 410,580
      L 390,580
      L 390,520
      L 380,520
      L 380,460
      L 390,460
      L 390,400
      L 410,400
      L 410,340
      L 430,340
      L 430,300
      L 460,300
      L 460,280
      L 500,280
      L 500,260
      L 540,260
      L 540,280
      L 600,280
      L 600,260
      L 660,260
      L 660,280
      L 700,280
      Z
    "
    fill="#CC2030"
    />
  </g>
</svg>
